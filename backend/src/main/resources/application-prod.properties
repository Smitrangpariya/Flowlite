# ==================== FlowLite — PROD Profile (MySQL 8) ====================
# Activated with: java -jar app.jar --spring.profiles.active=prod
# or via env var: SPRING_PROFILES_ACTIVE=prod (used in Docker)

# ==================== MySQL DATABASE ====================
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/flowlite?serverTimezone=UTC&useSSL=true&requireSSL=true}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / Hibernate ====================
# validate: only validates schema, does NOT create/modify tables (Flyway handles that)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ==================== FLYWAY ====================
# Flyway manages schema migrations via versioned SQL scripts
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false

# ==================== HikariCP (Production Tuning) ====================
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000

# ==================== H2 Console ====================
# Locked in production
spring.h2.console.enabled=false

# ==================== SWAGGER ====================
# Disabled in production for security
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ==================== COOKIE ====================
# Secure cookies in production
app.cookie.secure=true

# ==================== LOGGING ====================
logging.level.com.flowlite=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
