# ==================== FlowLite — DEV Profile (H2 In-Memory) ====================
# Activated by default (spring.profiles.default=dev in application.properties)
# Or explicitly: java -jar app.jar --spring.profiles.active=dev

# ==================== H2 DATABASE ====================
spring.datasource.url=jdbc:h2:mem:flowlite;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console — accessible at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==================== JPA / Hibernate ====================
# validate: Flyway manages the schema, Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# ==================== FLYWAY ====================
# Same migration scripts as prod — catches schema drift early
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==================== SWAGGER (Dev Only) ====================
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true

# ==================== DEV SECRETS (overrides base config for local dev) ====================
# Safe to hardcode here — dev profile only, never used in production
jwt.secret=dev-only-secret-key-that-is-at-least-256-bits-long-for-hmac-sha
cors.allowed-origins=http://localhost:5173,http://localhost:3000
