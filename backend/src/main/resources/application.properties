# Server Configuration
server.port=8080

# Database Configuration (Environment variable fallback to H2 for dev)
spring.datasource.url=${MYSQL_URL:jdbc:h2:mem:flowlite}
spring.datasource.username=${MYSQL_USER:sa}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==================== CONNECTION POOL (HikariCP) ====================
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# ==================== REQUEST LIMITS ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.max-http-request-header-size=16KB

# H2 Console (disabled by default — enable via dev profile)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ==================== SECURITY CONFIGURATION ====================

# JWT Configuration
# Secret key for signing tokens (should be at least 256 bits for HS256)
jwt.secret=${JWT_SECRET:FlowLiteSecretKey2024ForJWTTokenGenerationAndValidationMustBe256BitsLong}
# Token expiry: 1 hour (3600000ms) - adjust as needed for production
jwt.expiration=${JWT_EXPIRATION:3600000}

# Password encoding is handled by BCryptPasswordEncoder in SecurityConfig
# BCrypt automatically handles salting and is resistant to rainbow table attacks

# ==================== CORS CONFIGURATION ====================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ==================== ACTUATOR (Health checks) ====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ==================== LOGGING ====================
# Ensure no sensitive data in logs
logging.level.com.flowlite=INFO
logging.level.org.springframework.security=WARN
# Never log passwords or tokens
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==================== SWAGGER/OPENAPI ====================
# OpenAPI Documentation Path
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true

# Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Package Scanning
springdoc.packages-to-scan=com.flowlite.controller

# Show request/response examples
springdoc.swagger-ui.default-models-expand-depth=3
springdoc.swagger-ui.default-model-expand-depth=3

# ==================== COOKIE CONFIGURATION ====================
app.cookie.secure=${COOKIE_SECURE:false}

# ==================== BOARD LIMITS ====================
flowlite.board-limits.max-personal-boards-per-user=5
flowlite.board-limits.max-team-boards-per-org=-1
flowlite.board-limits.enforce-limits=true

# ==================== EMAIL (SMTP) ====================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
