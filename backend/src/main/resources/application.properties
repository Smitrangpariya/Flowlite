# ==================== FlowLite — Shared Configuration ====================
# Profile-specific overrides in application-dev.properties / application-prod.properties

# Default profile: dev (used when no profile is explicitly set)
spring.profiles.default=dev

# Server Configuration
server.port=8080

# ==================== JPA (Common) ====================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Flyway uses TINYINT(1) for booleans — tell Hibernate to expect that instead of BOOLEAN
spring.jpa.properties.hibernate.type.preferred_boolean_jdbc_type=TINYINT

# ==================== CONNECTION POOL (HikariCP) ====================
# Pool settings are profile-specific — see application-dev.properties / application-prod.properties

# ==================== REQUEST LIMITS ====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.max-http-request-header-size=16KB

# ==================== SECURITY CONFIGURATION ====================

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ==================== CORS CONFIGURATION ====================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ==================== ACTUATOR (Health checks) ====================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ==================== LOGGING ====================
logging.level.com.flowlite=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ==================== SWAGGER/OPENAPI ====================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=false
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=false
springdoc.packages-to-scan=com.flowlite.controller
springdoc.swagger-ui.default-models-expand-depth=3
springdoc.swagger-ui.default-model-expand-depth=3

# ==================== COOKIE CONFIGURATION ====================
app.cookie.secure=${COOKIE_SECURE:false}

# ==================== BOARD LIMITS ====================
flowlite.board-limits.max-personal-boards-per-user=5
flowlite.board-limits.max-team-boards-per-org=-1
flowlite.board-limits.enforce-limits=true

# ==================== EMAIL (SMTP) ====================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
